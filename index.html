<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Handwriting Converter</title>
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for handwriting styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Indie+Flower&family=Kalam:wght@300;400;700&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">Text to Handwriting</h1>
            <p class="text-gray-600">Convert your digital text into realistic handwritten notes.</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Left Column: Controls & Input -->
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-fit">
                
                <div class="control-group">
                    <label for="textInput" class="block text-sm font-medium text-gray-700 mb-1">Your Text</label>
                    <textarea id="textInput" rows="8" class="custom-scrollbar w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none" placeholder="Type or paste your text here...">This is an example of the Text to Handwriting converter!

Notice how the words automatically wrap to the next line when they reach the edge of the paper. You don't have to hit enter manually.

Try changing the fonts, adjusting the size, or switching the ink color below to see the canvas update in real-time.

Happy writing! ✍️</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="control-group">
                        <label for="fontSelect" class="block text-sm font-medium text-gray-700 mb-1">Font Style</label>
                        <select id="fontSelect" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Caveat">Caveat (Cursive)</option>
                            <option value="Kalam">Kalam (Casual)</option>
                            <option value="Indie Flower">Indie Flower (Neat)</option>
                            <option value="Shadows Into Light">Shadows (Messy)</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="fontSize" class="block text-sm font-medium text-gray-700 mb-1">Font Size</label>
                        <input type="number" id="fontSize" value="32" min="16" max="64" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="control-group">
                        <label for="inkColor" class="block text-sm font-medium text-gray-700 mb-1">Ink Color</label>
                        <div class="flex items-center gap-2">
                            <input type="color" id="inkColor" value="#000f55" class="h-10 w-10 cursor-pointer border-0 rounded p-0">
                            <span class="text-xs text-gray-500" id="hexDisplay">#000f55</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="paperType" class="block text-sm font-medium text-gray-700 mb-1">Paper Type</label>
                        <select id="paperType" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="ruled">Ruled Notebook</option>
                            <option value="blank">Blank Paper</option>
                        </select>
                    </div>
                </div>

                <!-- NEW: Selected Paragraph Controls -->
                <div class="mt-4 p-4 bg-blue-50 border border-blue-100 rounded-lg" id="selectionHintContainer">
                    <p class="text-sm text-blue-800 flex items-start gap-2">
                        <svg class="mt-0.5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        Click any paragraph on the paper to select it. You can then move it or change its color!
                    </p>
                </div>

                <div class="mt-4">
                    <button id="resetLayoutBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors border border-gray-300">
                        Reset Paragraph Positions
                    </button>
                </div>

                <div class="mt-6 pt-6 border-t border-gray-100">
                    <button id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download Image
                    </button>
                    <p class="text-xs text-center text-gray-400 mt-3">Downloads as a high-resolution PNG</p>
                </div>
            </div>

            <!-- Right Column: Canvas Output -->
            <div class="w-full lg:w-2/3 flex flex-col items-center justify-center bg-gray-200/50 p-4 md:p-8 rounded-xl border border-gray-200 overflow-hidden">
                <!-- A4 Aspect Ratio Canvas (Internal resolution: 794 x 1123 for 96 PPI A4) -->
                <canvas id="outputCanvas" width="794" height="1123" class="max-h-[85vh] object-contain"></canvas>
                
                <!-- Added visual hint for the dragging feature -->
                <p class="mt-4 text-sm text-gray-500 font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M9 19l3 3 3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
                    Click and drag on the paper to move the text
                </p>
            </div>
        </div>
    </div>

    <!-- Floating Toolbar for Selected Paragraph -->
    <div id="floatingToolbar" class="hidden absolute z-50 bg-white border border-gray-200 shadow-xl rounded-lg px-3 py-2 flex items-center gap-3">
        <div class="cursor-grab text-gray-400 hover:text-gray-600 flex items-center gap-1" title="Drag the box on the paper to move">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M9 19l3 3 3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
            <span class="text-xs font-medium">Move</span>
        </div>
        <div class="h-5 w-px bg-gray-300"></div>
        <div class="flex items-center gap-2" title="Change paragraph color">
            <input type="color" id="floatingColor" value="#000f55" class="h-6 w-6 cursor-pointer border-0 rounded p-0 bg-transparent">
            <span class="text-xs font-medium text-gray-600">Color</span>
        </div>
        <div class="h-5 w-px bg-gray-300"></div>
        <button id="floatingReset" class="text-gray-500 hover:text-red-500 transition-colors flex items-center gap-1" title="Reset position">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            <span class="text-xs font-medium">Reset</span>
        </button>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
